version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: code-duel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: codeduel
      POSTGRES_PASSWORD: codeduel123
      POSTGRES_DB: codeduel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: code-duel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
